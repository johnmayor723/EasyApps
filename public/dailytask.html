<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaaS Weekly Tasks</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:40px;
}

h1{
text-align:center;
}

.container{
max-width:800px;
margin:auto;
}

.day{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.day h2{
margin-top:0;
color:#333;
}

.task{
display:flex;
align-items:center;
margin:8px 0;
}

.task input{
margin-right:10px;
transform:scale(1.2);
}

.completed{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<h1>SaaS Development Tasks (This Week)</h1>

<div class="container">

<div class="day">
<h2>Day 1 – Dashboard Logic</h2>

<label class="task">
<input type="checkbox" data-id="task1">
<span>Fix dashboard return navigation</span>
</label>

<label class="task">
<input type="checkbox" data-id="task2">
<span>Ensure menu returns to last active page</span>
</label>

<label class="task">
<input type="checkbox" data-id="task3">
<span>Implement localStorage menu state</span>
</label>

</div>


<div class="day">
<h2>Day 2 – Dashboard UI Improvements</h2>

<label class="task">
<input type="checkbox" data-id="task4">
<span>Add dashboard overview cards</span>
</label>

<label class="task">
<input type="checkbox" data-id="task5">
<span>Add recent activity feed</span>
</label>

<label class="task">
<input type="checkbox" data-id="task6">
<span>Add quick action buttons</span>
</label>

</div>


<div class="day">
<h2>Day 3 – Menu Icons</h2>

<label class="task">
<input type="checkbox" data-id="task7">
<span>Add icons to dashboard menu items</span>
</label>

<label class="task">
<input type="checkbox" data-id="task8">
<span>Align icons with menu labels</span>
</label>

<label class="task">
<input type="checkbox" data-id="task9">
<span>Improve sidebar spacing and layout</span>
</label>

</div>


<div class="day">
<h2>Day 4 – Customer Analytics</h2>

<label class="task">
<input type="checkbox" data-id="task10">
<span>Add total customers analytics</span>
</label>

<label class="task">
<input type="checkbox" data-id="task11">
<span>Track new customers</span>
</label>

<label class="task">
<input type="checkbox" data-id="task12">
<span>Create customer growth chart</span>
</label>

</div>


<div class="day">
<h2>Day 5 – Order & CRM Analytics</h2>

<label class="task">
<input type="checkbox" data-id="task13">
<span>Add total orders analytics</span>
</label>

<label class="task">
<input type="checkbox" data-id="task14">
<span>Add revenue tracking</span>
</label>

<label class="task">
<input type="checkbox" data-id="task15">
<span>Include CRM insights (customer spend, activity)</span>
</label>

</div>

</div>


<script>

const checkboxes = document.querySelectorAll("input[type='checkbox']");

checkboxes.forEach(box => {

let saved = localStorage.getItem(box.dataset.id);

if(saved === "true"){
box.checked = true;
box.nextElementSibling.classList.add("completed");
}

box.addEventListener("change", () => {

localStorage.setItem(box.dataset.id, box.checked);

if(box.checked){
box.nextElementSibling.classList.add("completed");
}else{
box.nextElementSibling.classList.remove("completed");
}

});

});

</script>

</body>
</html>
